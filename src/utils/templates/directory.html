<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="h-screen flex flex-col bg-base-200 text-base-950 dark:bg-base-800 dark:text-base-100 antialiased">
    <div class="relative flex h-full flex-col">
      <header class="shrink-0 flex justify-between gap-3 p-2 transition-all border-b border-base-200 dark:border-base-800 hover:border-black/10 dark:hover:border-white/10">
        <div class="flex gap-3 items-center">
          {{parentLink}}
          <h1 class="text-lg font-semibold tracking-tight">
            {{path}}
          </h1>
        </div>

        <div class="flex gap-3 items-center">
          <div id="view-toolbar" class="flex gap-0.5">
            <button
              id="grid-view-btn"
              onclick="setView('grid')"
              class="toolbar-button"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none"><path fill="currentColor" fill-opacity="0.16" d="M8.4 3H4.6A1.6 1.6 0 0 0 3 4.6v3.8A1.6 1.6 0 0 0 4.6 10h3.8A1.6 1.6 0 0 0 10 8.4V4.6A1.6 1.6 0 0 0 8.4 3m11 11h-3.8a1.6 1.6 0 0 0-1.6 1.6v3.8a1.6 1.6 0 0 0 1.6 1.6h3.8a1.6 1.6 0 0 0 1.6-1.6v-3.8a1.6 1.6 0 0 0-1.6-1.6"/><path stroke="currentColor" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="1.5" d="M8.4 3H4.6A1.6 1.6 0 0 0 3 4.6v3.8A1.6 1.6 0 0 0 4.6 10h3.8A1.6 1.6 0 0 0 10 8.4V4.6A1.6 1.6 0 0 0 8.4 3Zm11 0h-3.8A1.6 1.6 0 0 0 14 4.6v3.8a1.6 1.6 0 0 0 1.6 1.6h3.8A1.6 1.6 0 0 0 21 8.4V4.6A1.6 1.6 0 0 0 19.4 3Zm-11 11H4.6A1.6 1.6 0 0 0 3 15.6v3.8A1.6 1.6 0 0 0 4.6 21h3.8a1.6 1.6 0 0 0 1.6-1.6v-3.8A1.6 1.6 0 0 0 8.4 14Zm11 0h-3.8a1.6 1.6 0 0 0-1.6 1.6v3.8a1.6 1.6 0 0 0 1.6 1.6h3.8a1.6 1.6 0 0 0 1.6-1.6v-3.8a1.6 1.6 0 0 0-1.6-1.6Z"/></g></svg>
            </button>
            <button
              id="list-view-btn"
              onclick="setView('list')"
              class="toolbar-button"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256"><g fill="currentColor"><path d="M216 64v128H96V64Z" opacity="0.2"/><path d="M88 64a8 8 0 0 1 8-8h120a8 8 0 0 1 0 16H96a8 8 0 0 1-8-8m128 56H96a8 8 0 1 0 0 16h120a8 8 0 0 0 0-16m0 64H96a8 8 0 1 0 0 16h120a8 8 0 0 0 0-16M56 56H40a8 8 0 0 0 0 16h16a8 8 0 0 0 0-16m0 64H40a8 8 0 1 0 0 16h16a8 8 0 0 0 0-16m0 64H40a8 8 0 1 0 0 16h16a8 8 0 0 0 0-16"/></g></svg>
            </button>
          </div>

          <div class="text-sm flex items-center font-medium text-base-600 dark:text-base-300">
            {{elementsCount}}
          </div>
        </div>
      </header>
      <main class="min-h-0 flex-1 overflow-y-auto p-3 pb-16">
        <ul id="view" class="list-view">
          {{rows}}
        </ul>
      </main>
    </div>
    <script>
      const container = document.getElementById('view');
      const viewToolbar = document.getElementById('view-toolbar');
      const viewToolbarBtns = viewToolbar.querySelectorAll('.toolbar-button');

      function setView(mode) {
        const viewBtn = document.getElementById(`${mode}-view-btn`);
        container.classList.remove('grid-view','list-view');
        container.classList.add(`${mode}-view`);

        viewToolbarBtns.forEach(btn => {
          if (btn.id === `${mode}-view-btn`) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        })
      }

      function toggleView() {
        const next = container.classList.contains('grid-view') ? 'list' : 'grid'
        localStorage.view = next
        setView(next)
      }

      setView(localStorage.view ?? 'list');
    </script>
  </body>
</html>
