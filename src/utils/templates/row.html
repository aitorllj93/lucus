<li>
  <a
    href="{{href}}"
    class="group view-item"
  >
    <div class="view-item__main">
      <span class="text-lg">{{icon}}</span>

      <div class="min-w-0">
        <div class="truncate font-medium text-black dark:text-white">{{name}}</div>
      </div>
    </div>

    <div class="view-item__details">
      <div>{{sizeLabel}}</div>
      <div>{{modifiedLabel}}</div>
    </div>
  </a>
</li>
